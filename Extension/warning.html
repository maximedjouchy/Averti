<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Averti Security</title>
    <style>
        :root { --primary: #d32f2f; --surface: #ffffff; --background: #f5f5f7; --text: #1d1d1f; --subtext: #86868b; }
        body.dark-mode { --surface: #1a1a1a; --background: #111111; --text: #f5f5f7; --subtext: #a1a1a6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--background); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: background-color 0.3s, color 0.3s; }
        .container { background: var(--surface); padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; border-top: 8px solid var(--primary); }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 20px; display: inline-block; color: var(--text); text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--primary); }
        .icon-large { font-size: 60px; margin-bottom: 20px; display: block; }
        h1 { margin: 0 0 10px 0; font-size: 24px; }
        p { color: var(--subtext); line-height: 1.6; margin-bottom: 30px; }
        #blockedUrlDisplay { background: #fff0f0; color: var(--primary); padding: 10px 15px; border-radius: 8px; font-family: monospace; font-weight: bold; display: inline-block; margin-bottom: 20px; word-break: break-all; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { border: none; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3); }
        .btn-secondary { background-color: transparent; color: var(--subtext); border: 1px solid #e5e5e5; }
        .btn-secondary:hover { color: var(--text); border-color: var(--text); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Aver<span>ti</span></div>
        <div class="icon-large">🛡️</div>
        
        <h1 data-i18n="accessBlocked">Accès Bloqué</h1>
        <p data-i18n="securityMsg">Pour votre sécurité, Averti a empêché le chargement de ce site web.</p>
        
        <div id="blockedUrlDisplay">...</div>
        
        <div class="btn-group">
            <button id="goBackButton" class="btn-primary" data-i18n="btnBack">Retourner en sécurité</button>
            <button id="bypassButton" class="btn-secondary" data-i18n="btnIgnore">Ignorer et continuer</button>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="warning.js"></script>
</body>
</html>
